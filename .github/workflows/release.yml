name: Release

on:
  push:
    tags:
      - "v*"

# 既定は最小権限 (read)。書き込みが必要な job でのみ昇格する。
permissions:
  contents: read

# 同一タグの再 push 等での競合を防ぐ
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    # build job は読み取りのみで十分
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            asset: dg-x86_64-apple-darwin.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            asset: dg-aarch64-apple-darwin.tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset: dg-x86_64-unknown-linux-gnu.tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup update stable
          rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.asset }} dg
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    # GitHub Release を作成するためにのみ書き込み権限を付与
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        # サードパーティ Action は SHA でピン留め (v2.6.1)
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          generate_release_notes: true
          files: "*.tar.gz"
